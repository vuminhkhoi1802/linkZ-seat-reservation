services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: seat_reservation
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d seat_reservation"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://app:app_password@postgres:5432/seat_reservation
      AUTH_PROVIDER: mock
      CLERK_SECRET_KEY: ""
      MOCK_PAYMENT_WEBHOOK_SECRET: local_mock_payment_webhook_secret
      INTERNAL_JOB_TOKEN: local_internal_job_token
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ""
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
